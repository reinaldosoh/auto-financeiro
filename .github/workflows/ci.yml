name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Importar módulos principais
        run: |
          python -c "import api_server; import auto_2fa; import fluxo_financeiro_completo; import fluxo_historico_corridas_taxas; print('imports OK')"
